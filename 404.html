<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 | Page Not Found | SummitGrip Climbing Gym</title>
    <link rel="icon" type="image/png" href="https://images.unsplash.com/photo-1522163182402-834f871fd851?w=64&h=64&fit=crop">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            color: #FFFFFF;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Light Mode */
        body.light-mode {
            background-color: #F0F0F0;
            color: #111111;
        }

        body.light-mode .error-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        body.light-mode .error-container p {
            color: #4B5563;
        }
        body.light-mode .error-container .error-sub {
            color: #6B7280;
        }
        body.light-mode .top-bar .logo-text {
            color: #111111;
        }
        body.light-mode .top-bar .control-btn {
            color: #111111;
            background: rgba(0,0,0,0.06);
            border-color: rgba(0,0,0,0.1);
        }
        body.light-mode .top-bar .control-btn:hover {
            background: rgba(249, 115, 22, 0.2);
            border-color: #F97316;
        }

        /* Color Variables */
        :root {
            --accent: #F97316;
            --accent-hover: #ea580c;
            --gray-muted: #9CA3AF;
        }

        .text-accent { color: var(--accent) !important; }

        /* ===== TOP BAR - FIXED POSITIONING ===== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: transparent;
            z-index: 100;
            pointer-events: none;
        }
        .top-bar > * {
            pointer-events: auto;
        }

        .logo-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            color: var(--accent);
        }
        .logo-text {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: white;
            transition: color 0.3s ease;
            white-space: nowrap;
        }
        .logo-text span:first-child {
            color: var(--accent);
        }

        .top-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .control-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(249, 115, 22, 0.15);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            cursor: pointer;
            color: white;
            border: 1px solid rgba(249, 115, 22, 0.15);
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }
        .control-btn:hover {
            background: rgba(249, 115, 22, 0.35);
            border-color: var(--accent);
        }
        .control-btn .icon {
            font-size: 14px;
        }
        .control-btn .label {
            font-size: 11px;
        }

        /* ===== ERROR CONTAINER ===== */
        .error-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 0;
        }

        .error-container {
            background: rgba(26, 26, 26, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 44px;
            width: 100%;
            max-width: 520px;
            border: 1px solid rgba(249, 115, 22, 0.15);
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            margin: 0 16px;
            text-align: center;
        }

        .error-container .error-icon {
            font-size: 80px;
            display: block;
            margin-bottom: 8px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .error-container .error-code {
            font-size: 5rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 4px;
            letter-spacing: -0.03em;
        }

        .error-container h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .error-container p {
            color: var(--gray-muted);
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .error-container .error-sub {
            color: #6B7280;
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        .error-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background-color: var(--accent);
            color: white;
            font-weight: 700;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-outline {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: transparent;
            color: var(--accent);
            font-weight: 700;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid var(--accent);
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }
        .btn-outline:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        .quick-links {
            display: flex;
            gap: 16px;
            margin-top: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .quick-links a {
            color: var(--gray-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .quick-links a:hover {
            color: var(--accent);
        }
        .quick-links span {
            color: #2A2A2A;
        }
        body.light-mode .quick-links span {
            color: #D1D5DB;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .top-bar {
                padding: 0 16px;
                height: 64px;
            }
            .logo-text {
                font-size: 1.2rem;
            }
            .logo-icon {
                width: 28px;
                height: 28px;
            }
            .control-btn {
                padding: 5px 10px;
                font-size: 11px;
            }
            .control-btn .label {
                font-size: 10px;
            }
            .error-container {
                padding: 36px 28px;
                max-width: 94%;
                border-radius: 24px;
                margin: 0 12px;
            }
            .error-container .error-code {
                font-size: 4rem;
            }
            .error-container .error-icon {
                font-size: 64px;
            }
            .error-container h2 {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 480px) {
            .top-bar {
                padding: 0 12px;
                height: 56px;
            }
            .logo-text {
                font-size: 1rem;
            }
            .logo-icon {
                width: 24px;
                height: 24px;
            }
            .control-btn {
                padding: 4px 8px;
                font-size: 10px;
                border-radius: 6px;
            }
            .control-btn .icon {
                font-size: 12px;
            }
            .control-btn .label {
                font-size: 9px;
            }
            .error-container {
                padding: 28px 20px;
                max-width: 96%;
                border-radius: 20px;
                margin: 0 8px;
            }
            .error-container .error-code {
                font-size: 3.2rem;
            }
            .error-container .error-icon {
                font-size: 52px;
            }
            .error-container h2 {
                font-size: 1.2rem;
            }
            .error-container p {
                font-size: 0.85rem;
            }
            .btn-primary, .btn-outline {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
            .quick-links {
                gap: 12px;
            }
            .quick-links a {
                font-size: 0.7rem;
            }
        }

        @media (max-width: 360px) {
            .top-bar {
                padding: 0 8px;
                height: 50px;
            }
            .logo-text {
                font-size: 0.85rem;
            }
            .logo-icon {
                width: 20px;
                height: 20px;
            }
            .control-btn {
                padding: 3px 6px;
                font-size: 9px;
            }
            .error-container {
                padding: 20px 16px;
                border-radius: 16px;
            }
            .error-container .error-code {
                font-size: 2.6rem;
            }
            .error-container .error-icon {
                font-size: 40px;
            }
            .error-container h2 {
                font-size: 1rem;
            }
        }

        /* RTL Support */
        [dir="rtl"] .top-bar {
            flex-direction: row-reverse;
        }
        [dir="rtl"] .top-controls {
            flex-direction: row-reverse;
        }
        [dir="rtl"] .quick-links {
            flex-direction: row-reverse;
        }
    </style>
</head>
<body>

    <!-- TOP BAR - Logo left, controls right -->
    <div class="top-bar">
        <a href="index.html" class="logo-brand">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            <span class="logo-text"><span>Summit</span>Grip</span>
        </a>

        <div class="top-controls">
            <button onclick="toggleDirection()" class="control-btn">
                <span class="icon">🌐</span>
                <span class="label" id="dirText">LTR</span>
            </button>
            <button onclick="toggleTheme()" class="control-btn">
                <span class="icon" id="themeIcon">🌙</span>
                <span class="label" id="themeText">Dark</span>
            </button>
        </div>
    </div>

    <!-- 404 ERROR CONTAINER -->
    <div class="error-wrapper">
        <div class="error-container">
            <span class="error-icon">🧗</span>
            <div class="error-code">404</div>
            <h2>Page Not Found</h2>
            <p>Oops! It seems you've wandered off the climbing wall.</p>
            <p class="error-sub">The page you're looking for doesn't exist or has been moved.</p>

            <div class="error-actions">
                <a href="index.html" class="btn-primary">
                    <span>🏠</span> Back to Home
                </a>
                <a href="contact.html" class="btn-outline">
                    <span>📬</span> Contact Support
                </a>
            </div>

            <div class="quick-links">
                <a href="climb.html">Climb</a>
                <span>•</span>
                <a href="training.html">Training</a>
                <span>•</span>
                <a href="event.html">Events</a>
                <span>•</span>
                <a href="faq.html">FAQ</a>
            </div>
        </div>
    </div>

    <script>
        // ----- DIRECTION (RTL/LTR) -----
        function toggleDirection() {
            const html = document.documentElement;
            const newDir = html.dir === 'rtl' ? 'ltr' : 'rtl';
            html.dir = newDir;
            const dirText = document.getElementById('dirText');
            if(dirText) dirText.innerText = newDir.toUpperCase();
        }

        // ----- THEME (Dark/Light) -----
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-mode');
            const isLight = body.classList.contains('light-mode');
            const themeText = document.getElementById('themeText');
            const themeIcon = document.getElementById('themeIcon');
            if(themeText) {
                themeText.innerText = isLight ? 'Light' : 'Dark';
            }
            if(themeIcon) {
                themeIcon.innerText = isLight ? '☀️' : '🌙';
            }
            localStorage.setItem('summitTheme', isLight ? 'light' : 'dark');
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('summitTheme');
        if(savedTheme === 'light') {
            document.body.classList.add('light-mode');
            const themeText = document.getElementById('themeText');
            const themeIcon = document.getElementById('themeIcon');
            if(themeText) themeText.innerText = 'Light';
            if(themeIcon) themeIcon.innerText = '☀️';
        }

        // ----- Prevent scroll -----
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('wheel', function(e) {
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'PageUp' || e.key === 'PageDown' || e.key === 'Home' || e.key === 'End') {
                e.preventDefault();
            }
        });
    </script>

</body>
</html>
